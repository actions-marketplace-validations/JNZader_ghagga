<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GHAGGA Docs</title>
  <meta name="description" content="Documentation for GHAGGA — AI-Powered Multi-Agent Code Review">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #a78bfa;
      --sidebar-background: #0f0a1a;
      --sidebar-nav-link-color--active: #a78bfa;
      --sidebar-name-color: #e2e8f0;
      --base-background-color: #0c0612;
      --base-color: #c4b5d6;
      --heading-color: #e2e8f0;
      --code-theme-background: #1a1028;
      --code-inline-background: #1a1028;
      --code-inline-color: #a78bfa;
      --blockquote-border-color: #a78bfa;
      --link-color: #a78bfa;
      --link-color--hover: #c4b5fa;
      --table-row-even-background: #1a1028;
      --sidebar-width: 280px;
      --sidebar-nav-link-font-weight: 400;
    }
    .sidebar-nav > ul > li > a {
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.05em;
    }
    .app-name-link img {
      max-width: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    /* Mermaid diagram container */
    .mermaid {
      text-align: center;
      margin: 1.5em 0;
    }
    .mermaid svg {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Mermaid must load BEFORE docsify -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#0c0612',
        primaryColor: '#2d1b4e',
        primaryTextColor: '#e2e8f0',
        primaryBorderColor: '#a78bfa',
        lineColor: '#7c3aed',
        secondaryColor: '#1a1028',
        tertiaryColor: '#1a1028',
        nodeTextColor: '#e2e8f0',
        edgeLabelBackground: '#1a1028',
        clusterBkg: '#1a1028',
        clusterBorder: '#a78bfa',
        titleColor: '#e2e8f0',
        actorTextColor: '#e2e8f0',
        actorBorder: '#a78bfa',
        actorBkg: '#2d1b4e',
        noteBkgColor: '#1a1028',
        noteTextColor: '#c4b5d6',
        noteBorderColor: '#a78bfa'
      }
    });

    // Unique ID counter for mermaid diagrams
    var mermaidId = 0;
  </script>

  <script>
    window.$docsify = {
      name: 'GHAGGA',
      repo: 'https://github.com/JNZader/ghagga',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        paths: 'auto'
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!'
      },
      plugins: [
        function mermaidPlugin(hook) {
          // Convert ```mermaid code blocks to <div class="mermaid"> before HTML is inserted
          hook.afterEach((html) => html.replace(
              /<pre[^>]*><code[^>]*class="lang-mermaid"[^>]*>([\s\S]*?)<\/code><\/pre>/gi,
              (_match, code) => {
                // Decode HTML entities
                var decoded = code
                  .replace(/&lt;/g, '<')
                  .replace(/&gt;/g, '>')
                  .replace(/&amp;/g, '&')
                  .replace(/&quot;/g, '"')
                  .replace(/&#39;/g, "'");
                return `<div class="mermaid">${decoded}</div>`;
              }
            ));

          // Render mermaid diagrams after the page DOM is ready
          hook.doneEach(() => {
            var els = document.querySelectorAll('.mermaid');
            if (els.length === 0) return;

            els.forEach((el) => {
              // Skip already-rendered diagrams
              if (el.getAttribute('data-mermaid-processed')) return;

              var graphDef = el.textContent.trim();
              var id = `mermaid-${mermaidId++}`;

              try {
                mermaid.render(id, graphDef).then((result) => {
                  el.innerHTML = result.svg;
                  el.setAttribute('data-mermaid-processed', 'true');
                }).catch((err) => {
                  console.warn('Mermaid render error:', err);
                  el.innerHTML = `<pre style="color:#f87171;">${err.message}</pre>`;
                });
              } catch (err) {
                console.warn('Mermaid render error:', err);
                el.innerHTML = `<pre style="color:#f87171;">${err.message}</pre>`;
              }
            });
          });
        }
      ]
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
</body>
</html>
