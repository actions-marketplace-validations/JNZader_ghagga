# NOTE: The canonical action.yml is at the repo root (/action.yml).
# This file is kept for reference / local development only.
# GitHub Actions resolves action.yml from the repo root.
#
# See: /action.yml

name: 'GHAGGA Code Review'
description: >-
  AI-powered multi-agent code review for PRs with built-in static analysis.
  Runs Semgrep, Trivy, and CPD directly on the GitHub Actions runner (cached).
  Free via GitHub Models. 6 providers, 3 review modes.
branding:
  icon: 'eye'
  color: 'purple'
inputs:
  provider:
    description: 'LLM provider (github, openai, anthropic, google, ollama, qwen)'
    required: false
    default: 'github'
  model:
    description: 'LLM model identifier'
    required: false
  mode:
    description: 'Review mode (simple, workflow, consensus)'
    required: false
    default: 'simple'
  api-key:
    description: 'LLM provider API key (not required for github provider)'
    required: false
  github-token:
    description: 'GitHub token for PR diffs and comments'
    required: false
    default: ${{ github.token }}
  enable-semgrep:
    description: >-
      Enable Semgrep security analysis. Runs directly on the runner.
      First run installs via pip (~2 min), subsequent runs use cache (~10s).
    required: false
    default: 'true'
  enable-trivy:
    description: >-
      Enable Trivy vulnerability scanning. Runs directly on the runner.
      First run installs via official script (~1 min), subsequent runs use cache (~5s).
    required: false
    default: 'true'
  enable-cpd:
    description: >-
      Enable PMD/CPD copy-paste detection. Runs directly on the runner.
      First run downloads PMD (~1 min), subsequent runs use cache (~5s).
    required: false
    default: 'true'
  enable-memory:
    description: >-
      Enable review memory. Caches observations between runs via @actions/cache.
      Set to 'false' to disable.
    required: false
    default: 'true'
outputs:
  status:
    description: 'Review status: PASSED, FAILED, NEEDS_HUMAN_REVIEW, or SKIPPED'
  findings-count:
    description: 'Number of findings from the review'
runs:
  using: 'node20'
  main: 'dist/index.js'
