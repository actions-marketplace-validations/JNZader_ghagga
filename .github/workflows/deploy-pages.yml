# ============================================
# GHAGGA v2 — Deploy to GitHub Pages
# ============================================
# Assembles landing page + React dashboard + Docsify docs
# into a single GitHub Pages deployment.
#
# Final URL structure:
#   /ghagga/          → Landing page (static HTML)
#   /ghagga/app/      → Dashboard (React SPA)
#   /ghagga/docs/     → Documentation (Docsify)

name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'docs/**'
      - 'landing/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: # Manual trigger from GitHub Actions UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build & Assemble
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm --filter @ghagga/dashboard build
        env:
          VITE_API_URL: ${{ vars.API_URL || 'https://ghagga.onrender.com' }}

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          cp landing/index.html _site/
          cp landing/favicon.svg _site/
          cp -r apps/dashboard/dist _site/app
          cp -r docs _site/docs
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
