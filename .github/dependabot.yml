# ============================================
# Dependabot — Automated dependency updates
# ============================================
# Checks for outdated/vulnerable deps weekly.
# Groups minor+patch together to reduce PR noise.

version: 2

updates:
  # ── npm (pnpm) dependencies ────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 10
    reviewers:
      - "JNZader"
    labels:
      - "dependencies"
    groups:
      # Group all minor+patch updates into a single PR
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # Major updates get individual PRs (breaking changes)
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Ignore packages that cause issues or are pinned intentionally
    ignore:
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-patch"]

  # ── GitHub Actions ─────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Argentina/Buenos_Aires"
    open-pull-requests-limit: 5
    reviewers:
      - "JNZader"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
