<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Glass Fill -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.05" />
    </linearGradient>

    <!-- Magnifying Glass Ring -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DDD6FE" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Icon Shape (Squircle) -->
  <rect width="400" height="400" rx="90" fill="url(#bg)" />

  <!-- Background decorative code brackets (subtle) -->
  <text x="40" y="90" font-family="monospace" font-size="28" fill="#38BDF8" font-weight="bold" opacity="0.15">{</text>
  <text x="340" y="80" font-family="monospace" font-size="28" fill="#FBBF24" font-weight="bold" opacity="0.15">}</text>
  <text x="70" y="340" font-family="monospace" font-size="24" fill="#34D399" font-weight="bold" opacity="0.15">&lt;/&gt;</text>

  <!-- ==================== TRIDENT ==================== -->
  <!-- Positioned slightly left so the magnifying handle balances it on the right -->
  <g transform="translate(150, 240)">
    
    <!-- Metallic Handle Base -->
    <line x1="0" y1="20" x2="0" y2="110" stroke="#64748B" stroke-width="24" stroke-linecap="round" />
    <path d="M -70,-10 Q -70,20 0,20 Q 70,20 70,-10" stroke="#64748B" stroke-width="24" stroke-linecap="round" fill="none" />

    <!-- Left Prong (Trivy - Blue) -->
    <g filter="url(#glow)">
      <line x1="-70" y1="-10" x2="-70" y2="-90" stroke="#38BDF8" stroke-width="18" stroke-linecap="round" />
      <polygon points="-70,-125 -86,-85 -54,-85" fill="#38BDF8" stroke-linejoin="round" />
    </g>

    <!-- Center Prong (Semgrep - Green) -->
    <g filter="url(#glow)">
      <line x1="0" y1="10" x2="0" y2="-120" stroke="#34D399" stroke-width="18" stroke-linecap="round" />
      <polygon points="0,-155 -16,-115 16,-115" fill="#34D399" stroke-linejoin="round" />
    </g>

    <!-- Right Prong (CPD - Amber) -->
    <g filter="url(#glow)">
      <line x1="70" y1="-10" x2="70" y2="-90" stroke="#FBBF24" stroke-width="18" stroke-linecap="round" />
      <polygon points="70,-125 54,-85 86,-85" fill="#FBBF24" stroke-linejoin="round" />
    </g>
  </g>

  <!-- ==================== MAGNIFYING GLASS ==================== -->
  <g transform="translate(230, 160)">
    
    <!-- Handle (Extending down and right) -->
    <line x1="55" y1="55" x2="135" y2="135" stroke="#4C1D95" stroke-width="36" stroke-linecap="round" />
    <line x1="55" y1="55" x2="135" y2="135" stroke="#8B5CF6" stroke-width="18" stroke-linecap="round" />

    <!-- Lens Outer Ring -->
    <circle cx="0" cy="0" r="80" stroke="url(#ring)" stroke-width="20" fill="none" />

    <!-- Lens Inner Glass (Tinting the right side of the trident underneath) -->
    <circle cx="0" cy="0" r="70" fill="url(#glass)" />

    <!-- Glass Reflections (Makes it look shiny and transparent) -->
    <path d="M -50,-50 A 70 70 0 0 1 25,-60" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.6" />
    <path d="M -60,-25 A 70 70 0 0 1 -25,-60" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.3" />
  </g>

</svg>
