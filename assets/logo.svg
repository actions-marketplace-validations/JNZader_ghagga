<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="lensRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="codeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)" stroke="#7c3aed" stroke-width="2" opacity="0.95"/>

  <!-- Cat body (mendieta - sitting pose) -->
  <g transform="translate(200, 220)">
    <!-- Tail curling from right -->
    <path d="M 40,60 C 80,50 100,20 95,-10 C 90,-30 70,-25 75,-10 C 80,5 60,30 40,40"
          fill="none" stroke="#6d6875" stroke-width="8" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="0" cy="45" rx="50" ry="40" fill="#4a4458"/>

    <!-- Front paws -->
    <ellipse cx="-20" cy="80" rx="14" ry="8" fill="#5b5270"/>
    <ellipse cx="20" cy="80" rx="14" ry="8" fill="#5b5270"/>

    <!-- Head -->
    <ellipse cx="0" cy="-10" rx="45" ry="40" fill="#4a4458"/>

    <!-- Left ear -->
    <path d="M -35,-35 L -45,-70 L -15,-45 Z" fill="#4a4458"/>
    <path d="M -33,-38 L -43,-65 L -18,-45 Z" fill="#6d4c7d"/>

    <!-- Right ear -->
    <path d="M 35,-35 L 45,-70 L 15,-45 Z" fill="#4a4458"/>
    <path d="M 33,-38 L 43,-65 L 18,-45 Z" fill="#6d4c7d"/>

    <!-- Eyes -->
    <ellipse cx="-16" cy="-15" rx="10" ry="11" fill="#1a1b2e"/>
    <ellipse cx="16" cy="-15" rx="10" ry="11" fill="#1a1b2e"/>
    <!-- Pupils - looking at the magnifying glass -->
    <ellipse cx="-13" cy="-15" rx="5" ry="6" fill="#a78bfa"/>
    <ellipse cx="19" cy="-15" rx="5" ry="6" fill="#a78bfa"/>
    <!-- Eye shine -->
    <circle cx="-11" cy="-18" r="2" fill="white" opacity="0.8"/>
    <circle cx="21" cy="-18" r="2" fill="white" opacity="0.8"/>

    <!-- Nose -->
    <path d="M -3,-2 L 0,2 L 3,-2 Z" fill="#c4a0d0"/>

    <!-- Mouth -->
    <path d="M 0,2 C -5,7 -8,5 -10,3" fill="none" stroke="#6d4c7d" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 0,2 C 5,7 8,5 10,3" fill="none" stroke="#6d4c7d" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="-20" y1="-3" x2="-50" y2="-10" stroke="#8b7fa8" stroke-width="1" opacity="0.6"/>
    <line x1="-20" y1="0" x2="-50" y2="2" stroke="#8b7fa8" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="-3" x2="50" y2="-10" stroke="#8b7fa8" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="0" x2="50" y2="2" stroke="#8b7fa8" stroke-width="1" opacity="0.6"/>

    <!-- Paw holding magnifying glass -->
    <ellipse cx="40" cy="40" rx="12" ry="10" fill="#5b5270" transform="rotate(-20, 40, 40)"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(275, 175)">
    <!-- Handle -->
    <rect x="20" y="30" width="12" height="55" rx="4" fill="#8b5cf6" transform="rotate(40, 26, 57)"/>
    <rect x="22" y="32" width="8" height="50" rx="3" fill="#7c3aed" transform="rotate(40, 26, 57)"/>

    <!-- Lens ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#lensRing)" stroke-width="6"/>
    <circle cx="0" cy="0" r="38" fill="url(#lens)"/>

    <!-- Code lines visible through lens -->
    <g opacity="0.9">
      <!-- Line 1: green (passed) -->
      <rect x="-22" y="-20" width="6" height="3" rx="1" fill="#34d399"/>
      <rect x="-13" y="-20" width="18" height="3" rx="1" fill="#34d399" opacity="0.7"/>

      <!-- Line 2: code -->
      <rect x="-22" y="-13" width="10" height="3" rx="1" fill="#818cf8" opacity="0.6"/>
      <rect x="-9" y="-13" width="14" height="3" rx="1" fill="#c4b5fd" opacity="0.5"/>

      <!-- Line 3: warning -->
      <rect x="-22" y="-6" width="8" height="3" rx="1" fill="#fbbf24" opacity="0.7"/>
      <rect x="-11" y="-6" width="20" height="3" rx="1" fill="#fbbf24" opacity="0.4"/>

      <!-- Line 4: code -->
      <rect x="-22" y="1" width="12" height="3" rx="1" fill="#818cf8" opacity="0.6"/>
      <rect x="-7" y="1" width="16" height="3" rx="1" fill="#c4b5fd" opacity="0.5"/>

      <!-- Line 5: green (passed) -->
      <rect x="-22" y="8" width="4" height="3" rx="1" fill="#34d399"/>
      <rect x="-15" y="8" width="22" height="3" rx="1" fill="#34d399" opacity="0.7"/>

      <!-- Line 6: code -->
      <rect x="-22" y="15" width="14" height="3" rx="1" fill="#818cf8" opacity="0.6"/>
      <rect x="-5" y="15" width="10" height="3" rx="1" fill="#c4b5fd" opacity="0.5"/>
    </g>

    <!-- Lens reflection -->
    <path d="M -25,-25 C -20,-30 -10,-32 -5,-28" fill="none" stroke="white" stroke-width="2.5" opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- Small floating code symbols around the cat -->
  <text x="70" y="120" font-family="monospace" font-size="16" fill="#34d399" opacity="0.4">{}</text>
  <text x="320" y="320" font-family="monospace" font-size="14" fill="#a78bfa" opacity="0.3">&lt;/&gt;</text>
  <text x="85" y="320" font-family="monospace" font-size="12" fill="#fbbf24" opacity="0.3">if()</text>
  <text x="100" y="160" font-family="monospace" font-size="10" fill="#818cf8" opacity="0.25">fn</text>

  <!-- Sparkles near the magnifying glass -->
  <circle cx="310" cy="130" r="2" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="330" cy="155" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="335" cy="195" r="1" fill="#ddd6fe" opacity="0.4"/>
</svg>
