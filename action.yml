name: 'GHAGGA Code Review'
description: >-
  AI-powered multi-agent code review for PRs with built-in static analysis.
  Runs Semgrep, Trivy, and CPD directly on the GitHub Actions runner (cached).
  Free via GitHub Models. 6 providers, 3 review modes.

branding:
  icon: 'eye'
  color: 'purple'

inputs:
  provider:
    description: >-
      LLM provider to use. Use "github" for free reviews via GitHub Models
      (no API key needed). Options: github, openai, anthropic, google, ollama, qwen.
    required: false
    default: 'github'

  model:
    description: >-
      LLM model identifier (e.g. gpt-4o-mini, claude-sonnet-4-20250514).
      Defaults to best model for chosen provider.
    required: false

  mode:
    description: >-
      Review mode. "simple" = single LLM call, "workflow" = 5 specialist agents,
      "consensus" = for/against/neutral voting.
    required: false
    default: 'simple'

  api-key:
    description: >-
      LLM provider API key. NOT required when using "github" provider
      (uses GITHUB_TOKEN automatically). Required for openai, anthropic, google, qwen.
    required: false

  github-token:
    description: >-
      GitHub token for fetching PR diffs and posting comments.
      Defaults to the automatic GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}

  enabled-tools:
    description: >-
      Comma-separated list of tool names to force-enable (overrides auto-detect).
      Example: "ruff,clippy,bandit". See README for the full list of 15 tools.
    required: false
    default: ''

  disabled-tools:
    description: >-
      Comma-separated list of tool names to force-disable (overrides always-on and auto-detect).
      Example: "gitleaks,cpd". See README for the full list of 15 tools.
    required: false
    default: ''

  enable-semgrep:
    description: >-
      [DEPRECATED — use disabled-tools instead]
      Enable Semgrep security analysis. Runs directly on the runner.
      First run installs via pip (~2 min), subsequent runs use cache (~10s).
    required: false
    default: 'true'

  enable-trivy:
    description: >-
      [DEPRECATED — use disabled-tools instead]
      Enable Trivy vulnerability scanning. Runs directly on the runner.
      First run installs via official script (~1 min), subsequent runs use cache (~5s).
    required: false
    default: 'true'

  enable-cpd:
    description: >-
      [DEPRECATED — use disabled-tools instead]
      Enable PMD/CPD copy-paste detection. Runs directly on the runner.
      First run downloads PMD (~1 min), subsequent runs use cache (~5s).
    required: false
    default: 'true'

  enable-memory:
    description: >-
      Enable review memory. Caches observations between runs via @actions/cache.
      Set to 'false' to disable.
    required: false
    default: 'true'

outputs:
  status:
    description: 'Review status: PASSED, FAILED, NEEDS_HUMAN_REVIEW, or SKIPPED'
  findings-count:
    description: 'Number of findings from the review'

runs:
  using: 'node20'
  main: 'apps/action/dist/index.js'
