# Render Blueprint — GHAGGA Server
# Deploy: connect repo on Render Dashboard, or use render.yaml auto-detect.
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: ghagga
    runtime: docker
    plan: free
    region: ohio
    branch: main
    dockerfilePath: apps/server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: STATE_SECRET
        sync: false
